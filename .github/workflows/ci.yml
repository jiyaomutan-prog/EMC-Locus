name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

env:
  CARGO_NET_RETRY: "10"
  CARGO_HTTP_TIMEOUT: "120"

jobs:
  validation:
    name: Local validation matrix
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.96.0
          components: rustfmt, clippy

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Print tool versions
        run: |
          rustc --version
          cargo --version
          py --version
          node --version
          npm --version

      - name: Check Rust formatting
        run: cargo fmt --check

      - name: Run Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Run Rust tests
        run: cargo test --workspace

      - name: Compile Python package
        run: py -m compileall python\emc_locus

      - name: Compile Qt console
        run: py -m py_compile apps\qt-console\main.py

      - name: Run Python tests
        env:
          PYTHONPATH: python
        run: py -m unittest discover -s python\tests

      - name: Validate SQLite migrations
        env:
          PYTHONPATH: python
        run: py -c "from pathlib import Path; from emc_locus.migrations import validate_sqlite_migrations; print(validate_sqlite_migrations(Path('storage/sqlite')))"

      - name: Install LAB CONSOLE dependencies
        working-directory: apps/lab-console
        run: npm ci

      - name: Typecheck LAB CONSOLE
        working-directory: apps/lab-console
        run: npm run typecheck

      - name: Lint LAB CONSOLE
        working-directory: apps/lab-console
        run: npm run lint

      - name: Test LAB CONSOLE units
        working-directory: apps/lab-console
        run: npm run test

      - name: Build LAB CONSOLE
        working-directory: apps/lab-console
        run: npm run build

      - name: Verify versioned LAB CONSOLE dist
        run: git diff --exit-code -- apps/lab-console/dist

      - name: Install Playwright browser
        working-directory: apps/lab-console
        run: npx playwright install chromium

      - name: Run LAB CONSOLE E2E
        working-directory: apps/lab-console
        env:
          PYTHONPATH: python
        run: npm run test:e2e

      - name: Check release consistency
        env:
          PYTHONPATH: python
        run: py -m unittest python.tests.test_release_consistency

      - name: Run launcher smoke
        env:
          PYTHONPATH: python
        run: .\scripts\smoke-launchers.ps1 -SkipQtOffscreen

      - name: Check whitespace
        run: git diff --check

      - name: Check staged whitespace
        run: git diff --cached --check

      - name: Upload failure diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ci-failure-diagnostics
          if-no-files-found: ignore
          path: |
            logs/launchers/**
            apps/lab-console/test-results/**
            apps/lab-console/playwright-report/**
